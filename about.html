<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会社概要｜株式会社K,S,A</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav>
  <div class="logo">K,S,A</div>
  <div class="menu-btn" onclick="toggleMenu()" id="menuBtn">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html" onclick="toggleMenu()">ホーム</a>
    <a href="about.html" onclick="toggleMenu()">会社概要</a>
    <a href="service.html" onclick="toggleMenu()">サービス</a>
    <a href="properties.html" onclick="toggleMenu()">物件情報</a>
    <a href="access.html" onclick="toggleMenu()">アクセス</a>
    <a href="contact.html" onclick="toggleMenu()">お問い合わせ</a>
  </div>
</nav>

<section>
<h1>会社概要</h1>

<div class="card fade">
<p>
社名：株式会社K,S,A<br>
住所：静岡県浜松市中央区早出町1200-11-201<br>
TEL：053-461-8101<br>
MAIL：ksa-1200@titan.ocn.ne.jp<br>
営業時間：9:00〜18:00（土日祝休み）<br>
社員数：4名<br>
資本金：4000万円<br>
事業内容：不動産業
</p>
</div>

</section>

<footer>© 株式会社K,S,A</footer>

<script>
// フェード
const els=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add('show')
  })
});
els.forEach(el=>obs.observe(el));

// ナビ影
window.addEventListener('scroll',()=>{
  const nav=document.querySelector('nav');
  if(window.scrollY>50){nav.classList.add('scrolled')}
  else{nav.classList.remove('scrolled')}
});

// メニュー
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  nav.classList.toggle("active");
  overlay.classList.toggle("active");

  if(nav.classList.contains("active")){
    btn.innerHTML = "×";
  } else {
    btn.innerHTML = "☰";
  }
}

// 外クリック
document.addEventListener("click", function(e){
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    overlay.classList.remove("active");
    btn.innerHTML = "☰";
  }
});
</script>

</body>
</html>
