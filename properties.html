<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件情報｜株式会社K,S,A</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <div class="logo">K,S,A</div>
  <div class="menu-btn" onclick="toggleMenu()" id="menuBtn">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html" onclick="toggleMenu()">ホーム</a>
    <a href="about.html" onclick="toggleMenu()">会社概要</a>
    <a href="service.html" onclick="toggleMenu()">サービス</a>
    <a href="properties.html" onclick="toggleMenu()">物件情報</a>
    <a href="access.html" onclick="toggleMenu()">アクセス</a>
    <a href="contact.html" onclick="toggleMenu()">お問い合わせ</a>
  </div>
</nav>

<section>
<h1>物件情報</h1>

<div class="card fade">
<h2>現在準備中</h2>
<p>現在、物件情報は準備中です。</p>
</div>

</section>

<footer>© 株式会社K,S,A</footer>

<script>
const els=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add('show')
  })
});
els.forEach(el=>obs.observe(el));

window.addEventListener('scroll',()=>{
  const nav=document.querySelector('nav');
  if(window.scrollY>50){nav.classList.add('scrolled')}
  else{nav.classList.remove('scrolled')}
});

function toggleMenu() {
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");

  nav.classList.toggle("active");

  if(nav.classList.contains("active")){
    btn.innerHTML = "×";
  } else {
    btn.innerHTML = "☰";
  }
}

document.addEventListener("click", function(e){
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    btn.innerHTML = "☰";
  }
});
</script>

</body>
</html>
