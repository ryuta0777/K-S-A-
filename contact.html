<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜株式会社K,S,A</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav>
  <div class="logo">K,S,A</div>
  <div class="menu-btn" onclick="toggleMenu()" id="menuBtn">☰</div>

  <div class="nav-links" id="navLinks">
    <a href="index.html" onclick="toggleMenu()">ホーム</a>
    <a href="about.html" onclick="toggleMenu()">会社概要</a>
    <a href="service.html" onclick="toggleMenu()">サービス</a>
    <a href="properties.html" onclick="toggleMenu()">物件情報</a>
    <a href="access.html" onclick="toggleMenu()">アクセス</a>
    <a href="contact.html" onclick="toggleMenu()">お問い合わせ</a>
  </div>
</nav>

<section>
<h1>お問い合わせ</h1>

<div class="card fade">

<form action="https://docs.google.com/forms/d/e/あなたのフォームURL/formResponse" method="POST" target="_blank">

<label>お名前</label>
<input type="text" name="entry.123456" required>

<label>メールアドレス</label>
<input type="email" name="entry.234567" required>

<label>お問い合わせ内容</label>
<textarea name="entry.345678" rows="5" required></textarea>

<button type="submit" class="btn">送信する</button>

</form>

</div>

</section>

<footer>© 株式会社K,S,A</footer>

<script>
// フェード
const els=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add('show')
  })
});
els.forEach(el=>obs.observe(el));

// ナビ影
window.addEventListener('scroll',()=>{
  const nav=document.querySelector('nav');
  if(window.scrollY>50){nav.classList.add('scrolled')}
  else{nav.classList.remove('scrolled')}
});

// メニュー
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  nav.classList.toggle("active");
  overlay.classList.toggle("active");

  if(nav.classList.contains("active")){
    btn.innerHTML = "×";
  } else {
    btn.innerHTML = "☰";
  }
}

// 外クリック
document.addEventListener("click", function(e){
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    overlay.classList.remove("active");
    btn.innerHTML = "☰";
  }
});
</script>

</body>
</html>
