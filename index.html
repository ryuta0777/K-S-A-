<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社K,S,A｜浜松市の不動産</title>
<meta name="description" content="浜松市の不動産なら株式会社K,S,A。">
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<nav>
  <div class="logo">K,S,A</div>

  <div class="menu-btn" onclick="toggleMenu()" id="menuBtn">
    ☰
  </div>

  <div class="nav-links" id="navLinks">
    <a href="index.html" onclick="toggleMenu()">ホーム</a>
    <a href="about.html" onclick="toggleMenu()">会社概要</a>
    <a href="service.html" onclick="toggleMenu()">サービス</a>
    <a href="properties.html" onclick="toggleMenu()">物件情報</a>
    <a href="access.html" onclick="toggleMenu()">アクセス</a>
    <a href="contact.html" onclick="toggleMenu()">お問い合わせ</a>
  </div>
</nav>

<!-- ヒーロー -->
<div class="hero">
  <div class="hero-content">
    <h1>株式会社K,S,A</h1>
    <p>浜松市の不動産会社</p>
  </div>
</div>

<section>
<h2>会社案内</h2>
<div class="card fade">
<p>浜松市を中心に不動産の賃貸・売買・管理を行っております。</p>
</div>
</section>

<section>
<h2>サービス内容</h2>
<div class="card fade">
<p>賃貸・売買・管理に対応しております。</p>
<a class="btn" href="service.html">詳しく見る</a>
</div>
</section>

<footer>© 株式会社K,S,A</footer>

<script>
// フェード
const els=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add('show')
  })
});
els.forEach(el=>obs.observe(el));

// スクロールナビ影
window.addEventListener('scroll',()=>{
  const nav=document.querySelector('nav');
  if(window.scrollY>50){nav.classList.add('scrolled')}
  else{nav.classList.remove('scrolled')}
});

// メニュー開閉
function toggleMenu() {
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  nav.classList.toggle("active");
  overlay.classList.toggle("active");

  if(nav.classList.contains("active")){
    btn.innerHTML = "×";
  } else {
    btn.innerHTML = "☰";
  }
}

// 外クリックで閉じる
document.addEventListener("click", function(e){
  const nav = document.getElementById("navLinks");
  const btn = document.getElementById("menuBtn");
  const overlay = document.getElementById("overlay");

  if (!nav.contains(e.target) && !btn.contains(e.target)) {
    nav.classList.remove("active");
    overlay.classList.remove("active");
    btn.innerHTML = "☰";
  }
});
</script>

</body>
</html>
