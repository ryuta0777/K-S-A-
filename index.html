<!DOCTYPE html>
<html lang="ja">
<head>

</head>

<body>

<nav>
<a href="index.html">ホーム</a>
<a href="about.html">会社概要</a>
<a href="service.html">サービス</a>
<a href="properties.html">物件情報</a>
<a href="access.html">アクセス</a>

</nav>

<header>
<h1>株式会社K,S,A</h1>
<p>浜松市の不動産会社</p>
</header>

<section>
<h2>会社案内</h2>
<div class="card fade">
<p>浜松市を中心に不動産の賃貸・売買・管理を行っております。</p>
</div>
</section>

<section>
<h2>サービス内容</h2>

<a class="btn" href="service.html">詳しく見る</a>
</div>
</section>

<footer>© 株式会社K,S,A</footer>

<script>
const els=document.querySelectorAll('.fade');
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('show')})});
els.forEach(el=>obs.observe(el));

window.addEventListener('scroll',()=>{
const nav=document.querySelector('nav');
if(window.scrollY>50){nav.classList.add('scrolled')}
else{nav.classList.remove('scrolled')}
});
</script>

</body>
